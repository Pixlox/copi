<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1f"/>
      <stop offset="100%" style="stop-color:#111114"/>
    </linearGradient>
    <linearGradient id="front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8c8d0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- All artwork scaled to 78% and centred, leaving ~12% transparent padding on each side -->
  <g transform="translate(56, 56) scale(0.781)">

    <!-- Background -->
    <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

    <!-- Back card -->
    <rect
      x="190" y="170"
      width="196" height="236"
      rx="28" ry="28"
      fill="url(#back)"
      stroke="rgba(255,255,255,0.12)"
      stroke-width="1.5"
      filter="url(#shadow)"
    />

    <!-- Front card -->
    <rect
      x="158" y="138"
      width="196" height="236"
      rx="28" ry="28"
      fill="url(#front)"
      filter="url(#shadow)"
    />

    <!-- Content lines -->
    <rect x="188" y="186" width="80" height="8" rx="4" fill="#1a1a1f" opacity="0.18"/>
    <rect x="188" y="206" width="136" height="8" rx="4" fill="#1a1a1f" opacity="0.12"/>
    <rect x="188" y="226" width="112" height="8" rx="4" fill="#1a1a1f" opacity="0.12"/>

  </g>
</svg>
